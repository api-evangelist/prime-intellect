      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
          title: Name
          description: Sandbox name
        docker_image:
          type: string
          minLength: 1
          title: Docker Image
          description: Docker image to run
        start_command:
          anyOf:
          - type: string
          - type: 'null'
          title: Start Command
          description: Command to run in container
        cpu_cores:
          type: number
          maximum: 16.0
          minimum: 0.1
          title: Cpu Cores
          description: CPU cores required
          default: 1.0
        memory_gb:
          type: number
          maximum: 64.0
          minimum: 0.1
          title: Memory Gb
          description: Memory in GB
          default: 2.0
        disk_size_gb:
          type: number
          maximum: 1000.0
          minimum: 0.1
          title: Disk Size Gb
          description: Disk size in GB
          default: 10.0
        gpu_count:
          type: integer
          maximum: 8.0
          minimum: 0.0
          title: Gpu Count
          description: Number of GPUs
          default: 0
        gpu_type:
          anyOf:
          - $ref: '#/components/schemas/GPUType'
          - type: 'null'
          description: GPU type (e.g. H100, A100). Required when gpu_count > 0
        vm:
          type: boolean
          title: Vm
          description: Create a VM sandbox on the VM sandbox infra. Required when requesting GPUs.
          default: false
        network_access:
          type: boolean
          title: Network Access
          description: Allow outbound internet access (enabled by default)
          default: true
        timeout_minutes:
          type: integer
          maximum: 1440.0
          minimum: 1.0
          title: Timeout Minutes
          description: Max execution time in minutes
          default: 60
        environment_vars:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Environment Vars
          description: Environment variables
        secrets:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Secrets
          description: Sensitive environment variables. Currently supported for CPU sandboxes only; VM sandboxes reject this
            field.
        labels:
          items:
            type: string
          type: array
          title: Labels
          description: Tags/labels for the sandbox
        team_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Team Id
          description: Team ID for team sandboxes
        advanced_configs:
          anyOf:
          - $ref: '#/components/schemas/AdvancedConfigs'
          - type: 'null'
          description: Advanced configuration options
        registry_credentials_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Registry Credentials Id
          description: Registry credentials ID for pulling private images
        region:
          anyOf:
          - type: string
          - type: 'null'
          title: Region
          description: Cluster region for the sandbox (e.g. us, india). Omit to allow automatic placement.
        guaranteed:
          type: boolean
          title: Guaranteed
          description: Admin/manager only. When true, schedule the sandbox with CPU/memory requests equal to its limits (Guaranteed
            QoS), bypassing the default oversubscription multiplier. Not applicable to VM sandboxes.
          default: false
        idempotency_key:
          anyOf:
          - type: string
            maxLength: 128
            minLength: 1
          - type: 'null'
          title: Idempotency Key
          description: Client-generated key used to deduplicate retried create requests.
      type: object
      required:
      - name
      - docker_image
      title: CreateSandboxRequest
