      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number (1-indexed)
          default: 1
          title: Page
        description: Page number (1-indexed)
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          description: Number of results per page
          default: 500
          title: Page Size
        description: Number of results per page
      - name: regions
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/Regions'
          - type: 'null'
          description: List of regions to filter
          title: Regions
        description: List of regions to filter
      - name: gpu_count
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Desired number of GPUs
          title: Gpu Count
        description: Desired number of GPUs
      - name: gpu_type
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/GPUType'
          - type: 'null'
          description: GPU model
          title: Gpu Type
        description: GPU model
      - name: socket
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/GPUSocket'
          - type: 'null'
          description: Socket for selected gpu model
          title: Socket
        description: Socket for selected gpu model
      - name: security
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/SecurityType'
          - type: 'null'
          description: Security type
          title: Security
        description: Security type
      - name: data_center_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by data center ID
          title: Data Center Id
        description: Filter by data center ID
      - name: cloud_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by cloud ID
          title: Cloud Id
        description: Filter by cloud ID
      - name: disks
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: List of disk IDs to filter instances by location
          title: Disks
        description: List of disk IDs to filter instances by location
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegacyAvailabilityResponse'
        '401':
          description: Authorization failed
        '422':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
