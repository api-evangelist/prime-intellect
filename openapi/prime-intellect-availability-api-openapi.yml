components:
  schemas:
    EnvironmentTypeEnum:
      type: string
      enum:
      - ubuntu_22_cuda_12
      - cuda_12_1_pytorch_2_2
      - cuda_11_8_pytorch_2_1
      - cuda_12_1_pytorch_2_3
      - cuda_12_1_pytorch_2_4
      - cuda_12_4_pytorch_2_4
      - cuda_12_4_pytorch_2_5
      - cuda_12_4_pytorch_2_6
      - cuda_12_6_pytorch_2_7
      - stable_diffusion
      - axolotl
      - bittensor
      - hivemind
      - petals_llama
      - vllm_llama_8b
      - vllm_llama_70b
      - vllm_llama_405b
      - custom_template
      - flux
      - prime_rl
      title: EnvironmentTypeEnum
    AvailabilityResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/GpuAvailability'
          type: array
          title: Items
          description: List of available GPU configurations
        totalCount:
          type: integer
          title: Totalcount
          description: Total number of matching GPU configurations
      type: object
      required:
      - items
      - totalCount
      title: AvailabilityResponse
    InstanceCountPricing:
      properties:
        cheapest:
          anyOf:
          - $ref: '#/components/schemas/PricingInfo'
          - type: 'null'
          description: Cheapest pricing across all regions
      additionalProperties: true
      type: object
      title: InstanceCountPricing
    DiskAvailabilityResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/DiskAvailability'
          type: array
          title: Items
          description: List of available disk configurations
        totalCount:
          type: integer
          title: Totalcount
          description: Total number of matching disk configurations
      type: object
      required:
      - items
      - totalCount
      title: DiskAvailabilityResponse
    Regions:
      type: string
      enum:
      - africa
      - asia_south
      - asia_northeast
      - australia
      - canada
      - eu_east
      - eu_north
      - eu_west
      - middle_east
      - south_america
      - united_states
      title: Regions
    Prices:
      properties:
        onDemand:
          anyOf:
          - type: number
          - type: 'null'
          title: Ondemand
          description: Price for on-demand usage, specified for secure_cloud security type.
          examples:
          - 1.15
        communityPrice:
          anyOf:
          - type: number
          - type: 'null'
          title: Communityprice
          description: Price for community cloud instances, specified for community_cloud security type.
          examples:
          - null
        isVariable:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Isvariable
          description: Indicates whether the price is variable and subject to change based on market conditions.
          examples:
          - false
        currency:
          $ref: '#/components/schemas/Currency'
          description: The currency in which the prices are denominated (e.g., USD, EUR).
      type: object
      required:
      - currency
      title: Prices
    DiskAvailability:
      properties:
        cloudId:
          anyOf:
          - type: string
          - type: 'null'
          title: Cloudid
          description: Cloud ID, used for provisioning
        provider:
          $ref: '#/components/schemas/ProviderTypeEnum'
          description: Provider's ID
        dataCenter:
          anyOf:
          - type: string
          - type: 'null'
          title: Datacenter
          description: Location of the data center housing the disk.
        country:
          anyOf:
          - type: string
          - type: 'null'
          title: Country
          description: Country where the data center is located.
        region:
          anyOf:
          - $ref: '#/components/schemas/Regions'
          - type: 'null'
          description: Region where the disk is located.
        spec:
          $ref: '#/components/schemas/CustomSpecValue'
          description: Configurable shared disk size in GB and price per GB per hour.
          default: {}
        stockStatus:
          type: string
          enum:
          - Available
          - Low
          - Medium
          - High
          - Unavailable
          title: Stockstatus
          description: Current stock availability status of disks.
          default: Available
        security:
          $ref: '#/components/schemas/SecurityType'
          description: Disk security classification (e.g., secure_cloud or community_cloud).
        isMultinode:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Ismultinode
          description: Indicates if the disk can be used with multiple instances.
          default: true
      type: object
      required:
      - provider
      - security
      title: DiskAvailability
    GPUSocket:
      type: string
      enum:
      - PCIe
      - SXM2
      - SXM3
      - SXM4
      - SXM5
      - SXM6
      title: GPUSocket
    CustomSpecValue:
      properties:
        minCount:
          anyOf:
          - type: integer
          - type: 'null'
          title: Mincount
          description: Minimum count for this specification.
          examples:
          - 2
        defaultCount:
          anyOf:
          - type: integer
          - type: 'null'
          title: Defaultcount
          description: Default count for the specification.
          examples:
          - 8
        maxCount:
          anyOf:
          - type: integer
          - type: 'null'
          title: Maxcount
          description: Maximum allowable count for this specification.
          examples:
          - 24
        pricePerUnit:
          anyOf:
          - type: number
          - type: 'null'
          title: Priceperunit
          description: Price per unit per hr.
          examples:
          - 0.005
        step:
          anyOf:
          - type: integer
          - type: 'null'
          title: Step
          description: Increment step for adjusting the count (e.g., increments by 1 or 10).
          examples:
          - 2
        defaultIncludedInPrice:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Defaultincludedinprice
          description: Indicates if the default count is included in the base price.
          examples:
          - false
        additionalInfo:
          anyOf:
          - type: string
          - type: 'null'
          title: Additionalinfo
          description: Any additional information or notes regarding this specification.
          examples:
          - null
          - This price is charged even for stopped instance
      type: object
      title: CustomSpecValue
    GpuAvailability:
      properties:
        cloudId:
          type: string
          title: Cloudid
          description: Cloud ID, used for provisioning
        gpuType:
          $ref: '#/components/schemas/GPUType'
          description: GPU model
        socket:
          $ref: '#/components/schemas/GPUSocket'
          description: GPU socket
        provider:
          $ref: '#/components/schemas/ProviderTypeEnum'
          description: Provider's ID
        region:
          anyOf:
          - $ref: '#/components/schemas/Regions'
          - type: 'null'
          description: Region where the GPU is located.
        dataCenter:
          anyOf:
          - type: string
          - type: 'null'
          title: Datacenter
          description: Location of the data center housing the GPU.
        country:
          anyOf:
          - type: string
          - type: 'null'
          title: Country
          description: Country where the data center is located.
        gpuCount:
          type: integer
          title: Gpucount
          description: Total number of GPUs available in this configuration.
        gpuMemory:
          type: integer
          title: Gpumemory
          description: Amount of memory available per GPU in GB.
        disk:
          $ref: '#/components/schemas/CustomSpecValue'
          description: Disk capacity in GB.
          default: {}
        sharedDisk:
          $ref: '#/components/schemas/CustomSpecValue'
          description: Shared disk capacity in GB.
          default: {}
        vcpu:
          $ref: '#/components/schemas/CustomSpecValue'
          description: Number of virtual CPUs allocated.
          default: {}
        memory:
          $ref: '#/components/schemas/CustomSpecValue'
          description: RAM size available in GB.
          default: {}
        internetSpeed:
          anyOf:
          - type: integer
          - type: 'null'
          title: Internetspeed
          description: Internet speed available in Mbps.
        interconnect:
          anyOf:
          - type: integer
          - type: 'null'
          title: Interconnect
          description: Interconnect speed between GPUs or nodes in Gbps.
        interconnectType:
          anyOf:
          - type: string
          - type: 'null'
          title: Interconnecttype
          description: Type of interconnect technology (e.g. Infiniband).
        provisioningTime:
          anyOf:
          - type: integer
          - type: 'null'
          title: Provisioningtime
          description: Estimated time in minutes required for GPU provisioning.
        stockStatus:
          type: string
          enum:
          - Available
          - Low
          - Medium
          - High
          - Unavailable
          title: Stockstatus
          description: Current stock availability status of GPUs.
          default: Available
        security:
          $ref: '#/components/schemas/SecurityType'
          description: GPU is either from community cloud or secure cloud
        prices:
          $ref: '#/components/schemas/Prices'
          description: Hourly pricing details.
        images:
          items:
            $ref: '#/components/schemas/EnvironmentTypeEnum'
          type: array
