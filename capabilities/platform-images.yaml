    - name: prime-intellect-initiatebuild
      description: Initiate a Docker image build.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-images.initiatebuild
      with:
        body: tools.body
      outputParameters:
      - type: object
