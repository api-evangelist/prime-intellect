naftiko: 1.0.0-alpha2
info:
  label: Prime Intellect Compute API — Disks
  description: Prime Intellect Compute API — Disks. 5 operations. Self-contained Naftiko capability covering one Prime Intellect
    business surface.
  tags:
  - Prime Intellect
  - Compute
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    PRIME_API_KEY: PRIME_API_KEY
capability:
  consumes:
  - type: http
    namespace: compute-disks
    baseUri: https://api.primeintellect.ai
    description: Prime Intellect Compute API — Disks business capability. Self-contained, no shared references.
    resources:
    - name: disks
      path: /api/v1/disks/
      operations:
      - name: createdisk
        method: POST
        description: Create a persistent network-attached disk.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getdisks
        method: GET
        description: List disks.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: disks-disk_id
      path: /api/v1/disks/{disk_id}
      operations:
      - name: getdisk
        method: GET
        description: Get a single disk.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: disk_id
          in: path
          type: string
          required: true
      - name: updatedisk
        method: PATCH
        description: Update a disk.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
        - name: disk_id
          in: path
          type: string
          required: true
      - name: deletedisk
        method: DELETE
        description: Delete a disk.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: disk_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.PRIME_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: compute-disks-rest
    port: 8080
    description: REST adapter for Prime Intellect Compute API — Disks.
    resources:
    - path: /v1/api/v1/disks/
      name: disks
      description: REST surface for disks.
      operations:
      - method: POST
        name: createdisk
        description: Create a persistent network-attached disk.
        call: compute-disks.createdisk
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getdisks
        description: List disks.
        call: compute-disks.getdisks
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/disks/{disk_id}
      name: disks-disk_id
      description: REST surface for disks-disk_id.
      operations:
      - method: GET
        name: getdisk
        description: Get a single disk.
        call: compute-disks.getdisk
        with:
          disk_id: rest.path.disk_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatedisk
        description: Update a disk.
        call: compute-disks.updatedisk
        with:
          body: rest.body
          disk_id: rest.path.disk_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedisk
        description: Delete a disk.
        call: compute-disks.deletedisk
        with:
          disk_id: rest.path.disk_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: compute-disks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prime Intellect Compute API — Disks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: prime-intellect-createdisk
      description: Create a persistent network-attached disk.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: compute-disks.createdisk
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getdisks
      description: List disks.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-disks.getdisks
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getdisk
      description: Get a single disk.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-disks.getdisk
      with:
        disk_id: tools.disk_id
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-updatedisk
      description: Update a disk.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: compute-disks.updatedisk
      with:
        body: tools.body
        disk_id: tools.disk_id
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-deletedisk
      description: Delete a disk.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: compute-disks.deletedisk
      with:
        disk_id: tools.disk_id
      outputParameters:
      - type: object
        mapping: $.
