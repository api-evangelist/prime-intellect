      operations:
      - name: createeval
        method: POST
        description: Create a new evaluation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listevals
        method: GET
        description: List evaluations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: evaluations-evaluation_id
      path: /api/v1/evaluations/{evaluation_id}
      operations:
      - name: geteval
        method: GET
        description: Get a single evaluation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: evaluation_id
          in: path
          type: string
          required: true
      - name: deleteeval
        method: DELETE
        description: Delete an evaluation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: evaluation_id
          in: path
          type: string
          required: true
    - name: evaluations-evaluation_id-finalize
      path: /api/v1/evaluations/{evaluation_id}/finalize
