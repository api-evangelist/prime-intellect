      - name: finalizeeval
        method: POST
        description: Finalize an evaluation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
        - name: evaluation_id
          in: path
          type: string
          required: true
    - name: evaluations-evaluation_id-samples
      path: /api/v1/evaluations/{evaluation_id}/samples
      operations:
      - name: pushsamples
        method: POST
        description: Push samples to an evaluation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
        - name: evaluation_id
