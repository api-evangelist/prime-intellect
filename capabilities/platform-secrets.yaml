naftiko: 1.0.0-alpha2
info:
  label: Prime Intellect Platform API — Secrets
  description: Prime Intellect Platform API — Secrets. 5 operations. Self-contained Naftiko capability covering one Prime
    Intellect business surface.
  tags:
  - Prime Intellect
  - Platform
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    PRIME_API_KEY: PRIME_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-secrets
    baseUri: https://api.primeintellect.ai
    description: Prime Intellect Platform API — Secrets business capability. Self-contained, no shared references.
    resources:
    - name: secrets
      path: /api/v1/secrets/
      operations:
      - name: createsecret
        method: POST
        description: Create a secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listsecrets
        method: GET
        description: List secrets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: secrets-secret_id
      path: /api/v1/secrets/{secret_id}
      operations:
      - name: getsecret
        method: GET
        description: Get a secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secret_id
          in: path
          type: string
          required: true
      - name: updatesecret
        method: PATCH
        description: Update a secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
        - name: secret_id
          in: path
          type: string
          required: true
      - name: deletesecret
        method: DELETE
        description: Delete a secret.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secret_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      value: '{{env.PRIME_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: platform-secrets-rest
    port: 8080
    description: REST adapter for Prime Intellect Platform API — Secrets.
    resources:
    - path: /v1/api/v1/secrets/
      name: secrets
      description: REST surface for secrets.
      operations:
      - method: POST
        name: createsecret
        description: Create a secret.
        call: platform-secrets.createsecret
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listsecrets
        description: List secrets.
        call: platform-secrets.listsecrets
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/secrets/{secret_id}
      name: secrets-secret_id
      description: REST surface for secrets-secret_id.
      operations:
      - method: GET
        name: getsecret
        description: Get a secret.
        call: platform-secrets.getsecret
        with:
          secret_id: rest.path.secret_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesecret
        description: Update a secret.
        call: platform-secrets.updatesecret
        with:
          body: rest.body
          secret_id: rest.path.secret_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesecret
        description: Delete a secret.
        call: platform-secrets.deletesecret
        with:
          secret_id: rest.path.secret_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-secrets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prime Intellect Platform API — Secrets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: prime-intellect-createsecret
      description: Create a secret.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-secrets.createsecret
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-listsecrets
      description: List secrets.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-secrets.listsecrets
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getsecret
      description: Get a secret.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-secrets.getsecret
      with:
        secret_id: tools.secret_id
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-updatesecret
      description: Update a secret.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-secrets.updatesecret
      with:
        body: tools.body
        secret_id: tools.secret_id
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-deletesecret
      description: Delete a secret.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-secrets.deletesecret
      with:
        secret_id: tools.secret_id
      outputParameters:
      - type: object
        mapping: $.
