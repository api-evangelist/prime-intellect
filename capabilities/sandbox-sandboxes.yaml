      operations:
      - name: closesshsession
        method: DELETE
        description: Close an SSH session.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
        - name: session_id
          in: path
          type: string
          required: true
    - name: sandbox-sandbox_id-error-context
      path: /api/v1/sandbox/{sandbox_id}/error-context
      operations:
      - name: geterrorcontext
        method: GET
        description: Get rich error context from sandbox execution.
        outputRawFormat: json
        outputParameters:
