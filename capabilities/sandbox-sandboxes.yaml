    description: Prime Intellect Sandbox API — Sandboxes business capability. Self-contained, no shared references.
    resources:
    - name: sandbox
      path: /api/v1/sandbox
      operations:
      - name: createsandbox
        method: POST
        description: Create a new sandbox.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listsandboxes
        method: GET
        description: List sandboxes.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sandbox-sandbox_id
      path: /api/v1/sandbox/{sandbox_id}
      operations:
      - name: getsandbox
        method: GET
        description: Get sandbox details.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
      - name: deletesandbox
        method: DELETE
        description: Delete a sandbox.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
