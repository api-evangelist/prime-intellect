naftiko: 1.0.0-alpha2
info:
  label: Prime Intellect Sandbox API — Sandboxes
  description: Prime Intellect Sandbox API — Sandboxes. 11 operations. Self-contained Naftiko capability covering one Prime
    Intellect business surface.
  tags:
  - Prime Intellect
  - Sandbox
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    PRIME_API_KEY: PRIME_API_KEY
