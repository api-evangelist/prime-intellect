        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
    - name: sandbox-sandbox_id-auth
      path: /api/v1/sandbox/{sandbox_id}/auth
      operations:
      - name: getsandboxauth
        method: GET
        description: Get sandbox auth token.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sandbox_id
          in: path
          type: string
          required: true
    - name: sandbox-sandbox_id-expose
