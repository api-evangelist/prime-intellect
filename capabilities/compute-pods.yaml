naftiko: 1.0.0-alpha2
info:
  label: Prime Intellect Compute API — Pods
  description: Prime Intellect Compute API — Pods. 7 operations. Self-contained Naftiko capability covering one Prime Intellect
    business surface.
  tags:
  - Prime Intellect
  - Compute
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    PRIME_API_KEY: PRIME_API_KEY
capability:
  consumes:
  - type: http
    namespace: compute-pods
    baseUri: https://api.primeintellect.ai
    description: Prime Intellect Compute API — Pods business capability. Self-contained, no shared references.
    resources:
    - name: pods
      path: /api/v1/pods/
      operations:
      - name: createpod
        method: POST
        description: Provision a new GPU pod on the Prime Intellect compute marketplace.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getpods
        method: GET
        description: List all GPU pods for the current account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pods-pod_id
      path: /api/v1/pods/{pod_id}
      operations:
      - name: getpod
        method: GET
        description: Get a single pod by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pod_id
          in: path
          type: string
          required: true
      - name: deletepod
        method: DELETE
        description: Terminate a pod.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pod_id
          in: path
          type: string
          required: true
    - name: pods-pod_id-log
      path: /api/v1/pods/{pod_id}/log
      operations:
      - name: getpodlog
        method: GET
        description: Stream stdout/stderr logs for a pod.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pod_id
          in: path
          type: string
          required: true
    - name: pods-status
      path: /api/v1/pods/status
      operations:
      - name: getpodstatus
        method: GET
        description: Get aggregate pod status for the account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pods-history
      path: /api/v1/pods/history
      operations:
      - name: getpodshistory
        method: GET
        description: Retrieve pod history.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      value: '{{env.PRIME_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: compute-pods-rest
    port: 8080
    description: REST adapter for Prime Intellect Compute API — Pods.
    resources:
    - path: /v1/api/v1/pods/
      name: pods
      description: REST surface for pods.
      operations:
      - method: POST
        name: createpod
        description: Provision a new GPU pod on the Prime Intellect compute marketplace.
        call: compute-pods.createpod
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getpods
        description: List all GPU pods for the current account.
        call: compute-pods.getpods
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/pods/{pod_id}
      name: pods-pod_id
      description: REST surface for pods-pod_id.
      operations:
      - method: GET
        name: getpod
        description: Get a single pod by id.
        call: compute-pods.getpod
        with:
          pod_id: rest.path.pod_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepod
        description: Terminate a pod.
        call: compute-pods.deletepod
        with:
          pod_id: rest.path.pod_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/pods/{pod_id}/log
      name: pods-pod_id-log
      description: REST surface for pods-pod_id-log.
      operations:
      - method: GET
        name: getpodlog
        description: Stream stdout/stderr logs for a pod.
        call: compute-pods.getpodlog
        with:
          pod_id: rest.path.pod_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/pods/status
      name: pods-status
      description: REST surface for pods-status.
      operations:
      - method: GET
        name: getpodstatus
        description: Get aggregate pod status for the account.
        call: compute-pods.getpodstatus
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/pods/history
      name: pods-history
      description: REST surface for pods-history.
      operations:
      - method: GET
        name: getpodshistory
        description: Retrieve pod history.
        call: compute-pods.getpodshistory
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: compute-pods-mcp
    port: 9090
    transport: http
    description: MCP adapter for Prime Intellect Compute API — Pods. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: prime-intellect-createpod
      description: Provision a new GPU pod on the Prime Intellect compute marketplace.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: compute-pods.createpod
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getpods
      description: List all GPU pods for the current account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-pods.getpods
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getpod
      description: Get a single pod by id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-pods.getpod
      with:
        pod_id: tools.pod_id
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-deletepod
      description: Terminate a pod.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: compute-pods.deletepod
      with:
        pod_id: tools.pod_id
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getpodlog
      description: Stream stdout/stderr logs for a pod.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-pods.getpodlog
      with:
        pod_id: tools.pod_id
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getpodstatus
      description: Get aggregate pod status for the account.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-pods.getpodstatus
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: prime-intellect-getpodshistory
      description: Retrieve pod history.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-pods.getpodshistory
      with: {}
      outputParameters:
      - type: object
        mapping: $.
