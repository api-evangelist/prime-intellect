      Create, manage, and submit samples to evaluations against the Prime Intellect Environments Hub (2,500+ RL
      environments). Supports both client-driven evaluations (push samples, finalize, retrieve) and fully hosted
      evaluations executed by Prime Intellect with logs, cancellation, and selectable inference models. Backs `prime
      eval` CLI commands.
  - aid: prime-intellect:prime-intellect-inference-api
    name: Prime Intellect Inference API
    tags:
      - Inference
      - OpenAI Compatible
      - Foundation Models
      - LLM
    humanURL: https://docs.primeintellect.ai/inference/overview
    baseURL: https://api.pinference.ai/api/v1
    properties:
      - url: https://docs.primeintellect.ai/inference/overview
        type: Documentation
      - url: https://docs.primeintellect.ai/inference/usage
        type: Documentation
      - url: https://docs.primeintellect.ai/inference/adapter-deployments
        type: Documentation
      - url: openapi/prime-intellect-inference-api-openapi.yml
        type: OpenAPI
    description: >-
      OpenAI-compatible inference API for hosted frontier and open models served at api.pinference.ai. Supports
      streaming chat completions, the full set of OpenAI parameters (temperature, top_p, max_tokens, logprobs), and
      returns a `usage` object with input/output token counts and USD cost on every response. LoRA adapters can be
      served alongside base models via 1-click deployments.
  - aid: prime-intellect:prime-intellect-platform-api
    name: Prime Intellect Platform API
    tags:
      - Account
      - Teams
      - Secrets
      - Images
      - Administration
    humanURL: https://docs.primeintellect.ai/api-reference/teams
    baseURL: https://api.primeintellect.ai
    properties:
      - url: https://docs.primeintellect.ai/api-reference/teams
        type: Documentation
      - url: https://docs.primeintellect.ai/api-reference/api-keys
        type: Authentication
      - url: openapi/prime-intellect-platform-api-openapi.yml
        type: OpenAPI
    description: >-
      Account, team, secrets, image, and cluster administration. Whoami and team membership, secret CRUD for use inside
      pods and sandboxes, Docker image builds with public/private visibility, registry credential checks, FRP plugin
      validation, and admin-only cluster + node-log endpoints.
name: Prime Intellect
description: >-
  Prime Intellect is a San Francisco–based startup building an open and decentralized stack for developing and improving
  AI agents through reinforcement learning. The company combines a 50+ provider GPU compute marketplace (single-node and
  1–256 GPU multi-node clusters across H100, H200, B200, and B300), a managed RL post-training service ("Lab") that
  fine-tunes Qwen3.5, Llama, NVIDIA Nemotron, and OpenAI gpt-oss base models against a 2,500+ environment library (the
  Environments Hub), secure remote Python sandboxes for agent code execution, OpenAI-compatible inference at
  api.pinference.ai with LoRA adapter deployments, and an evaluations service that runs against the same environments.
  Prime Intellect is also the publisher of INTELLECT-3 (100B+ MoE trained with RL), INTELLECT-2 (32B trained via
  distributed RL), and the SYNTHETIC-2 dataset of four million reasoning traces, and develops the open-source
  `verifiers` RL library and the `prime-rl` async RL training framework. Everything is exposed via a single bearer-token
  REST API at api.primeintellect.ai, a `prime` Python CLI/SDK (PyPI: `prime`, lightweight `prime-sandboxes`), and the
  OpenAI protocol on the inference plane.
