      - SSH Keys
      - Availability
    humanURL: https://docs.primeintellect.ai/api-reference/managing-pods
    baseURL: https://api.primeintellect.ai
    properties:
      - url: https://docs.primeintellect.ai/api-reference/introduction
        type: Documentation
      - url: https://docs.primeintellect.ai/api-reference/managing-pods
        type: Documentation
      - url: https://docs.primeintellect.ai/api-reference/managing-disks
        type: Documentation
      - url: https://docs.primeintellect.ai/api-reference/check-gpu-availability
        type: Documentation
      - url: openapi/prime-intellect-compute-api-openapi.yml
        type: OpenAPI
      - url: json-schema/prime-intellect-pod-schema.json
        type: JSONSchema
      - url: json-ld/prime-intellect-context.jsonld
        type: JSONLD
    description: >-
      Programmatic access to the Prime Intellect compute marketplace. Query GPU availability across 50+ providers,
      provision and manage on-demand or multi-node GPU pods (1-256 GPUs across H100, H200, B200, B300, A100), attach
      persistent network disks, and manage SSH keys for pod access. Backs the `prime pods`, `prime availability`, and
      `prime disks` CLI commands.
  - aid: prime-intellect:prime-intellect-sandbox-api
    name: Prime Intellect Sandbox API
    tags:
      - Sandbox
      - Code Execution
      - Agents
      - Tunnels
    humanURL: https://docs.primeintellect.ai/sandboxes/overview
    baseURL: https://api.primeintellect.ai
    properties:
      - url: https://docs.primeintellect.ai/sandboxes/overview
        type: Documentation
      - url: https://docs.primeintellect.ai/sandboxes/sdk
        type: Documentation
      - url: https://docs.primeintellect.ai/sandboxes/cli
        type: Documentation
      - url: https://docs.primeintellect.ai/sandboxes/tunnel
        type: Documentation
      - url: openapi/prime-intellect-sandbox-api-openapi.yml
        type: OpenAPI
      - url: json-schema/prime-intellect-sandbox-schema.json
        type: JSONSchema
    description: >-
      Secure remote code-execution sandboxes for AI agents. Create and manage Python-3.11-slim-based sandboxes, expose
      ports for HTTP services running inside the sandbox, open SSH sessions, pull rich error context for failures, and
      provision reverse tunnels back into a sandbox from an external network. Available as a lightweight
      `prime-sandboxes` Python package (~50KB) in addition to the full `prime` CLI/SDK.
  - aid: prime-intellect:prime-intellect-training-api
    name: Prime Intellect Training API
    tags:
      - Reinforcement Learning
      - Training
      - Fine-Tuning
      - Foundation Models
      - Billing
    humanURL: https://docs.primeintellect.ai/hosted-training/what-is-lab
    baseURL: https://api.primeintellect.ai
    properties:
      - url: https://docs.primeintellect.ai/hosted-training/what-is-lab
        type: Documentation
      - url: https://docs.primeintellect.ai/hosted-training/getting-started
        type: Documentation
      - url: https://docs.primeintellect.ai/hosted-training/end-to-end-run
        type: Documentation
      - url: https://docs.primeintellect.ai/hosted-training/models-and-pricing
        type: Pricing
      - url: openapi/prime-intellect-training-api-openapi.yml
        type: OpenAPI
      - url: json-schema/prime-intellect-training-run-schema.json
        type: JSONSchema
    description: >-
      Hosted reinforcement-learning post-training service ("Lab"). Launch dedicated training runs against a catalog of
      base models — Qwen3.5 (0.8B through 397B-A17B), Llama 1B/3B Instruct, NVIDIA Nemotron 30B/120B, OpenAI gpt-oss
      20B/120B — drive them with environments from the Environments Hub, and retrieve token-level usage + USD cost per
      run from the billing endpoints. Pricing is per-million-token across separate input, output, and training meters.
  - aid: prime-intellect:prime-intellect-evaluations-api
    name: Prime Intellect Evaluations API
    tags:
      - Evaluations
      - Benchmarks
      - Reinforcement Learning
      - Environments
    humanURL: https://docs.primeintellect.ai/tutorials-environments/hosted-evaluations
    baseURL: https://api.primeintellect.ai
    properties:
