        name: input
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.02'
        userMultiplied: false
      - label: Output tokens
        name: output
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.06'
        userMultiplied: false
      - label: Training tokens
        name: training
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '0.06'
        userMultiplied: false
