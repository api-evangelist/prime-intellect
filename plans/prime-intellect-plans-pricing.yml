    name: Hosted Training — Additional Models
    type: usage-based
    description: Other supported base models include Qwen3.5 sizes 2B, 4B, 9B, 35B-A3B, 122B-A10B; Llama 1B/3B
      Instruct; NVIDIA Nemotron 30B/120B; and OpenAI gpt-oss 20B/120B. All billed per million tokens (input, output,
      training).
