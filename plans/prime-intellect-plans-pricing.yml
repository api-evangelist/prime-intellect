specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Prime Intellect
providerId: prime-intellect
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - AI
  - GPU Compute
  - Reinforcement Learning
  - Inference
  - Sandboxes
description: 'Reconciled plans and pricing for Prime Intellect — GPU compute marketplace (on-demand hourly), hosted
  RL training (per-million-token input/output/training), inference (per-million-token input/output), sandboxes, and
  persistent disks. Source: primeintellect.ai and docs.primeintellect.ai.'
sources:
  - https://www.primeintellect.ai/
  - https://docs.primeintellect.ai/hosted-training/models-and-pricing
  - https://docs.primeintellect.ai/inference/overview
  - https://docs.primeintellect.ai/sandboxes/overview
plans:
  - id: prime-intellect-compute-on-demand
    name: Compute Marketplace — On-Demand GPUs
    type: usage-based
    description: Hourly on-demand GPU instances across 50+ providers. Single-node and multi-node (1-256 GPUs) with
      Infiniband, SLURM, and Kubernetes orchestration.
    entries:
      - label: H100 GPU-hour (representative)
        name: gpu_h100_hour
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '2.43'
        userMultiplied: false
      - label: H200 GPU-hour (representative low)
        name: gpu_h200_low_hour
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.47'
        userMultiplied: false
      - label: H200 GPU-hour (representative high)
        name: gpu_h200_high_hour
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '1.99'
        userMultiplied: false
      - label: B300 GPU-hour (representative)
        name: gpu_b300_hour
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '4.99'
        userMultiplied: false
  - id: prime-intellect-compute-reserved
    name: Compute Marketplace — Liquid Reserved Clusters
    type: quote-based
    description: Custom-quoted reserved GPU clusters built by gathering competitive quotes from 50+ providers. Pricing
      is per-engagement; talk to sales.
    entries: []
  - id: prime-intellect-training-qwen35-0p8b
    name: Hosted Training — Qwen3.5 0.8B
    type: usage-based
    description: Hosted RL post-training for the smallest Qwen3.5 model. Billed per million tokens across input,
      output, and training.
    entries:
